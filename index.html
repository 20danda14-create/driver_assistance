<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Driver Assistance - Aviation HUD Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* Prevent scrolling during driving */
        }
        /* Style for the HUD compass container to contain the sliding effect */
        #hud-compass-container {
            width: 80%;
            height: 6rem; /* Adjust based on your visual reference */
            overflow: hidden;
            position: relative;
            background: rgba(13, 17, 23, 0.5); /* Semi-transparent background */
            border-bottom: 2px solid rgba(201, 209, 217, 0.3); /* Reference line */
        }
        /* Style for the sliding compass strip */
        #hud-compass-strip {
            position: absolute;
            height: 100%;
            white-space: nowrap;
            transition: transform 0.1s linear; /* Smooth sliding */
            font-family: 'Courier New', Courier, monospace; /* Monospaced for uniform width */
            color: #00f2fe; /* Aviation HUD cyan */
        }
        /* Custom styling for the center marker */
        #compass-marker {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background-color: #ff9f43; /* Amber accent */
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-between p-4 select-none">

    <div id="permission-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 text-center">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-sm border border-slate-700">
            <i class="fa-solid fa-car-side text-6xl text-blue-500 mb-6 animate-pulse"></i>
            <h1 class="text-2xl font-bold mb-4 text-white">Sürüş Asistanı</h1>
            <p class="text-slate-400 text-sm mb-8">Hız, mesafe, ve HUD pusula için konum ve hareket sensörü izinleri gereklidir.</p>
            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-2xl transition duration-300 transform active:scale-95 shadow-lg">
                İzin Ver ve Başlat
            </button>
        </div>
    </div>

    <header class="bg-slate-800/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center shadow-lg">
        <div>
            <span class="text-xs text-slate-400 uppercase tracking-wider block">Mevcut Konum Hava Durumu</span>
            <div id="weather-info" class="text-sm font-medium mt-1 text-blue-400">
                <i class="fa-solid fa-spinner animate-spin mr-1"></i> Bekleniyor...
            </div>
        </div>
        <div class="text-right">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-500/10 text-green-400">
                <span class="h-2 w-2 rounded-full bg-green-400 mr-1.5 animate-ping"></span> GPS
            </span>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center my-6 space-y-8">
        
        <div class="text-center">
            <div id="speed" class="text-8xl font-black tracking-tighter text-white">0</div>
            <div class="text-xs uppercase tracking-widest text-slate-400 font-bold mt-1">KM/H ANLIK HIZ</div>
        </div>

        <div class="text-center text-5xl font-mono font-bold text-[#00f2fe]" id="heading-display">172°</div>
        <div id="hud-compass-container" class="rounded-xl border border-slate-700">
            <div id="compass-marker"></div>
            <div id="hud-compass-strip">
                </div>
        </div>
        <div class="text-xs uppercase tracking-widest text-slate-400 font-bold mt-1">HUD YÖN</div>

    </main>

    <footer class="space-y-3">
        <div class="bg-slate-800/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="p-3 bg-blue-500/10 rounded-xl border border-blue-500/20 text-blue-400">
                    <i class="fa-solid fa-road text-lg"></i>
                </div>
                <div>
                    <span class="text-xs text-slate-400 block">GİDİLEN MESAFE</span>
                    <span id="distance" class="text-xl font-mono font-bold text-white">0.00 km</span>
                </div>
            </div>
            <button id="reset-distance" class="text-xs bg-slate-700 active:bg-slate-600 px-3 py-2 rounded-lg text-white">Sıfırla</button>
        </div>

        <div class="bg-slate-800/80 backdrop-blur-md p-4 rounded-2xl border border-slate-700/50 max-h-40 overflow-y-auto">
            <div class="flex items-center justify-between mb-2 pb-2 border-b border-slate-700/50">
                <span class="text-xs font-bold uppercase tracking-wider text-amber-400 flex items-center">
                    <i class="fa-solid fa-traffic-light mr-2"></i> 5 KM Trafik Durumu
                </span>
                <span id="traffic-status" class="text-[10px] text-slate-400">Güncel</span>
            </div>
            <ul id="traffic-list" class="space-y-1.5 text-xs text-slate-300">
                <li class="text-green-400 font-medium"><i class="fa-solid fa-circle-check mr-2"></i>Kritik yoğunluk tespit edilmedi.</li>
            </ul>
        </div>
    </footer>

    <script>
        let totalDistance = 0;
        let lastCoords = null;
        let lastTrafficUpdate = 0;
        const hudCompassStrip = document.getElementById('hud-compass-strip');
        const headingDisplay = document.getElementById('heading-display');

        // Retain original functionality
        const startBtn = document.getElementById('start-btn');
        const permissionOverlay = document.getElementById('permission-overlay');
        const speedEl = document.getElementById('speed');
        const distanceEl = document.getElementById('distance');
        const weatherInfoEl = document.getElementById('weather-info');
        const trafficListEl = document.getElementById('traffic-list');
        const trafficStatusEl = document.getElementById('traffic-status');
        const resetDistanceBtn = document.getElementById('reset-distance');

        resetDistanceBtn.addEventListener('click', () => {
            totalDistance = 0;
            distanceEl.innerText = "0.00 km";
        });

        // Generate the compass strip content
        function generateCompassStrip() {
            let stripContent = '';
            // Generate a full circle, repeated to allow continuous sliding
            for (let j = 0; j < 2; j++) { // Repeat twice for continuous look
                for (let i = 0; i < 36; i++) {
                    let degree = i * 10;
                    let label = degree.toString().padStart(3, '0');
                    if (degree === 0) label = 'N';
                    else if (degree === 90) label = 'E';
                    else if (degree === 180) label = 'S';
                    else if (degree === 270) label = 'W';
                    
                    // Add label and ticks
                    stripContent += `<span class="compass-label inline-block text-center w-24">${label}</span>`;
                    stripContent += `<span class="compass-tick inline-block text-center w-6 text-sm text-slate-600">|</span>`;
                }
            }
            hudCompassStrip.innerHTML = stripContent;
        }
        generateCompassStrip();

        startBtn.addEventListener('click', async () => {
            weatherInfoEl.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1"></i> Veriler çekiliyor...`;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    fetchWeatherData(lat, lon);
                    fetchTrafficData(lat, lon);
                    
                    navigator.geolocation.watchPosition(updateDrivingData, handleLocationError, {
                        enableHighAccuracy: true
                    });
                }, handleLocationError, { enableHighAccuracy: true });
            } else {
                alert("GPS desteği bulunamadı.");
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                    } else {
                        alert("Pusula izni reddedildi.");
                    }
                } catch (err) {
                    console.error("Sensör izin hatası:", err);
                }
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            }

            permissionOverlay.style.display = 'none';
        });

        function updateDrivingData(position) {
            if (position.coords.speed !== null && position.coords.speed > 0) {
                const kmh = Math.round(position.coords.speed * 3.6);
                speedEl.innerText = kmh;
            } else {
                speedEl.innerText = "0";
            }

            if (lastCoords) {
                const distanceIncrement = calculateDistance(
                    lastCoords.latitude, lastCoords.longitude,
                    position.coords.latitude, position.coords.longitude
                );
                if (distanceIncrement > 0.002) { 
                    totalDistance += distanceIncrement;
                    distanceEl.innerText = totalDistance.toFixed(2) + " km";
                }
            }
            lastCoords = position.coords;

            const now = Date.now();
            if (now - lastTrafficUpdate > 120000) {
                fetchTrafficData(position.coords.latitude, position.coords.longitude);
            }
        }

        // Updated for sliding HUD compass
        function handleOrientation(event) {
            let heading = null;
            if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) {
                heading = event.webkitCompassHeading;
            } else if (event.alpha !== null) {
                heading = event.absolute ? event.alpha : 360 - event.alpha;
            }

            if (heading !== null) {
                const roundedHeading = Math.round(heading);
                headingDisplay.innerText = `${roundedHeading.toString().padStart(3, '0')}°`;
                
                // Calculate translation
                const stripWidth = hudCompassStrip.offsetWidth / 2; // Single full circle width
                const translation = (heading / 360) * stripWidth;
                
                // Set the sliding position
                hudCompassStrip.style.transform = `translateX(${-translation}px)`;
            }
        }

        // Retain original fallback weather
        function fetchWeatherData(lat, lon) {
            const primaryUrl = `https://www.7timer.info/bin/astro.php?lon=${lon}&lat=${lat}&ac=0&unit=metric&output=json`;
            fetch(primaryUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Primary failed");
                    return response.json();
                })
                .then(data => {
                    if (data && data.dataseries && data.dataseries.length > 0) {
                        const current = data.dataseries[0];
                        weatherInfoEl.innerText = `Açık, ${current.temp2m}°C`;
                    } else { throw new Error("Bad data"); }
                })
                .catch(() => fetchFallbackWeather(lat, lon));
        }

        function fetchFallbackWeather(lat, lon) {
            const fallbackUrl = `https://wttr.in/${lat},${lon}?format=j1`;
            fetch(fallbackUrl)
                .then(res => res.json())
                .then(data => {
                    if (data && data.current_condition) {
                        const current = data.current_condition[0];
                        weatherInfoEl.innerText = `${current.lang_tr[0].value}, ${current.temp_C}°C`;
                    }
                })
                .catch(() => weatherInfoEl.innerText = "Hava durumu alınamadı.");
        }

        // Retain original traffic data
        function fetchTrafficData(lat, lon) {
            trafficStatusEl.innerText = "Güncelleniyor...";
            trafficListEl.innerHTML = `<li class="text-green-400 font-medium"><i class="fa-solid fa-circle-check mr-2"></i>Kritik yoğunluk tespit edilmedi.</li>`;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function handleLocationError(error) {
            console.error("GPS Hatası:", error);
        }
    </script>
</body>
</html>
